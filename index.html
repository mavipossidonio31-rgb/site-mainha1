<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jesus Te Ama</title>
    <style>
        /* Estilos do Fundo */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffc0cb; /* Rosa principal */
            
            /* Padrão de Emojis para Flores e Corações */
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='30' font-size='20'%3E🌸%3C/text%3E%3Ctext x='50' y='70' font-size='20'%3E❤️%3C/text%3E%3Ctext x='60' y='20' font-size='18'%3E🌼%3C/text%3E%3Ctext x='20' y='60' font-size='18'%3E💖%3C/text%3E%3C/svg%3E");
            background-repeat: repeat;
        }

        /* Cartão Central */
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 90%;
        }

        h1 {
            color: #d81b60;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        /* Estilo da Foto Única */
        .foto-container {
            position: relative;
            display: inline-block;
        }

        .foto-item {
            width: 350px;
            height: 350px;
            object-fit: cover;
            cursor: pointer;
            
            /* Borda Rosa Bebê */
            border: 12px solid #fce4ec; 
            border-radius: 25px;
            
            transition: transform 0.2s ease, border-color 0.3s;
            display: block; /* Garante que não haja espaço extra */
        }

        .foto-item:hover {
            border-color: #f8bbd0;
        }

        .foto-item:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Jesus te ama e eu também</h1>
        
        <div class="foto-container">
            <img src="fotos/f1.jpg" id="fotoPrincipal" class="foto-item" alt="Foto">
        </div>
    </div>

    <script>
        // Array com o caminho das suas 3 fotos
        const listaFotos = [
            "fotos/f1.jpg",
            "fotos/f2.jpg",
            "fotos/f3.jpg"
        ];

        let indice = 0;
        const imgElemento = document.getElementById('fotoPrincipal');

        // Função de clique
        imgElemento.addEventListener('click', function() {
            // Avança para o próximo número (0, 1, 2)
            indice = (indice + 1) % listaFotos.length;
            
            // Troca o arquivo da foto atual
            imgElemento.src = listaFotos[indice];
            
            console.log("Exibindo agora: " + listaFotos[indice]);
        });
    </script>

</body>
</html>
