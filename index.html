<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parabéns Mainha</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffd6e7;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      position: relative;
    }

    /* Figurinhas decorativas */
    .decoracao{
      position: absolute;
      font-size: 40px;
      opacity: 0.7;
      animation: flutuar 6s infinite ease-in-out;
    }

    @keyframes flutuar {
      0%{
        transform: translateY(0px) rotate(0deg);
      }
      50%{
        transform: translateY(-15px) rotate(5deg);
      }
      100%{
        transform: translateY(0px) rotate(0deg);
      }
    }

    .container{
      text-align: center;
      z-index: 2;
    }

    h1{
      color: #ff2e78;
      font-size: 3rem;
      margin-bottom: 25px;
      text-shadow: 2px 2px 8px rgba(255,255,255,0.7);
    }

    img{
      width: 320px;
      max-width: 85vw;
      height: 420px;
      object-fit: cover;
      border-radius: 20px;
      border: 6px solid white;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
    }

    img:hover{
      transform: scale(1.03);
    }

    p{
      margin-top: 15px;
      color: #d63384;
      font-weight: bold;
    }

    /* Posições das decorações */
    .d1{ top: 5%; left: 8%; }
    .d2{ top: 15%; right: 10%; }
    .d3{ bottom: 10%; left: 12%; }
    .d4{ bottom: 15%; right: 8%; }
    .d5{ top: 40%; left: 5%; }
    .d6{ top: 50%; right: 5%; }

  </style>
</head>
<body>

  <!-- Figurinhas -->
  <div class="decoracao d1">💖</div>
  <div class="decoracao d2">🌸</div>
  <div class="decoracao d3">💗</div>
  <div class="decoracao d4">🌺</div>
  <div class="decoracao d5">💞</div>
  <div class="decoracao d6">🌷</div>

  <div class="container">
    <h1>Parabéns Mainha 💕</h1>

    <img 
      id="foto" 
      src="fotos/f1.jpg" 
      alt="Foto da Mainha"
    >

    <p>Clique na foto 💖</p>
  </div>

  <script>
    const fotos = [
      "fotos/f1.jpg",
      "fotos/f2.jpg",
      "fotos/f3.jpg",
      "fotos/f4.jpg",
      "fotos/f5.jpg"
    ];

    let indice = 0;

    const imagem = document.getElementById("foto");

    imagem.addEventListener("click", () => {
      indice++;

      if(indice >= fotos.length){
        indice = 0;
      }

      imagem.src = fotos[indice];
    });
  </script>

</body>
</html>
